<!DOCTYPE html>
<html>
    <head>
        <title>AI Resume Analyser</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-dark bg-primary">
            <div class="container">
                <a class="nabar-brand" href="https://www.homeofprogramming.com">Home Of Programming</a>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="card-shadow">
                <div class="card-header bg-success text-white">
                    <h3>AI Career Guidance Assistant</h3>
                </div>
                <div class="card-body">
                    <form action="/analyse" method="post" encType="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Upload Resume:</label>
                            <input type="file" name="resume" class="form-control">
                        </div>
                        
                        <button class="btn btn-primary">Analyse Resume</button>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
